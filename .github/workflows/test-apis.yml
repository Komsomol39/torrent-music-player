name: Test Search APIs

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run HTML structure test
        run: python3 scripts/test_html.py 2>&1 | tee scripts/html-test-output.txt
      - name: Save results to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/html-test-output.txt
          git diff --staged --quiet || (git commit -m "test: html output" && git push)
