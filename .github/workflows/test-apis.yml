name: Test Search APIs

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/test_apis.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run API tests
        run: python3 scripts/test_apis.py
      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add scripts/api-test-results.json
          git diff --staged --quiet || git commit -m "test: update API test results"
          git push
