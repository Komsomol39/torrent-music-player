name: Test Search APIs

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/test_apis.py'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run API tests
        run: python3 scripts/test_apis.py
      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: scripts/api-test-results.json
