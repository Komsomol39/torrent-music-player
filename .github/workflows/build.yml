name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      - name: Build debug APK
        id: build
        run: |
          gradle assembleDebug --no-daemon > build-output.txt 2>&1 || true
          # Все строки с ошибками компилятора (e: путь:строка:столбец сообщение)
          grep -n "^e: \|^w: \|FAILED\|Exception\|error:" build-output.txt > build-errors.txt || true
          if grep -q "BUILD SUCCESSFUL" build-output.txt; then
            echo "build_ok=true" >> $GITHUB_OUTPUT
          else
            echo "build_ok=false" >> $GITHUB_OUTPUT
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Save errors
        run: |
          git config user.email "ci@build.bot"
          git config user.name "Build Bot"
          git add build-errors.txt
          git diff --staged --quiet || git commit -m "ci: errors #${{ github.run_number }}"
          git push

      - name: Upload APK
        if: steps.build.outputs.build_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: TorrentMusicPlayer-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Fail if build failed
        if: steps.build.outputs.build_ok == 'false'
        run: exit 1
